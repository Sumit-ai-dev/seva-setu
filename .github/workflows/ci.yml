name: CI — Nexus Health

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-syntax:
    name: Backend — Python Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install core dependencies only
        run: |
          pip install --upgrade pip
          pip install fastapi uvicorn python-dotenv pyjwt passlib bcrypt python-jose pydantic sqlalchemy aiosqlite httpx python-multipart
          echo "✅ Core backend dependencies installed"

      - name: Check Python syntax on all files
        run: |
          find backend -name "*.py" -not -path "*/.*" | xargs python -m py_compile
          echo "✅ All Python files passed syntax check"

  frontend-build:
    name: Frontend — Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci --prefer-offline
          echo "✅ Frontend dependencies installed"

      - name: Build
        run: |
          cd frontend
          npm run build
          echo "✅ Frontend production build successful"
        env:
          VITE_API_URL: https://api.nexushealth.example.com/api/v1
          VITE_GOOGLE_MAPS_API_KEY: AIzaSyPlaceholderForCIBuild
          VITE_GEMINI_API_KEY: placeholder_ci_key
          VITE_OPENAI_API_KEY: placeholder_ci_key
